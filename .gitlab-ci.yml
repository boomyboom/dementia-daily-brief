# GitLab Pages 배포 — index.html 과 briefs/ 를 public/ 으로 복사해 서빙
# (Slack 알림은 로컬 run_daily_brief.sh → slack_notify.py 가 평일 8시·2시에만 담당.
#  CI에서는 Slack을 보내지 않는다 → 코드 push 자체로는 슬랙 알림이 생기지 않음.)
pages:
  stage: deploy
  image: alpine:latest
  script:
    - mkdir -p public
    - cp index.html public/
    - cp -r briefs public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
